<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Serial Monitor Event Context</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0c0d0e;
      color: #d6d6d6;
    }

    body {
      position: fixed;
      inset: 0;
      font-family: Consolas, "Cascadia Mono", "Cascadia Code", Menlo, monospace;
      font-size: 13px;
      line-height: 1.15;
      letter-spacing: 0;
      font-variant-ligatures: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    #contextScroll {
      position: absolute;
      inset: 0;
      overflow: auto;
      background: #0c0d0e;
      scrollbar-color: #3a3a3a #0c0d0e;
      scrollbar-width: thin;
      outline: none;
    }

    #contextText {
      display: block;
      width: max-content;
      min-width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0 2px;
      box-sizing: border-box;
      white-space: pre;
      color: #d6d6d6;
      background: #0c0d0e;
      font: inherit;
      line-height: inherit;
      letter-spacing: 0;
      tab-size: 4;
      user-select: text;
      -webkit-user-select: text;
      cursor: text;
    }

    #contextText::selection {
      background: #375a7f;
      color: #ffffff;
    }

    #contextScroll::-webkit-scrollbar {
      width: 10px;
      height: 10px;
      background: #0c0d0e;
    }

    #contextScroll::-webkit-scrollbar-track {
      background: #0c0d0e;
    }

    #contextScroll::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border: 2px solid #0c0d0e;
    }

    #contextScroll::-webkit-scrollbar-corner,
    ::-webkit-scrollbar-corner {
      background: #0c0d0e;
    }
  </style>
</head>
<body>
  <div id="contextScroll" tabindex="0">
    <pre id="contextText">Select an event.</pre>
  </div>
  <script>
    const scrollHost = document.getElementById('contextScroll');
    const contextText = document.getElementById('contextText');

    function normalizeText(text) {
      const normalized = String(text ?? '');
      return normalized.length > 0 ? normalized : 'Select an event.';
    }

    window.setContextText = function (text) {
      const normalized = normalizeText(text);
      contextText.textContent = normalized;
      scrollHost.scrollTop = 0;
      scrollHost.scrollLeft = 0;
      return {
        ok: true,
        length: normalized.length
      };
    };

    window.clearContext = function () {
      return window.setContextText('Select an event.');
    };

    document.addEventListener('keydown', event => {
      const isCopyShortcut = (event.ctrlKey || event.metaKey) &&
        !event.altKey &&
        event.key.toLowerCase() === 'c';
      if (!isCopyShortcut) {
        return;
      }

      const selectedText = window.getSelection ? window.getSelection().toString() : '';
      if (!selectedText) {
        return;
      }

      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage({ type: 'copySelection', text: selectedText });
        event.preventDefault();
        event.stopPropagation();
        return;
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(selectedText).catch(() => {});
      }
    }, true);
  </script>
</body>
</html>
